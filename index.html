<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Демо-форма: дата, текст, телефон, почта, число, файл">
    <title>Демо-форма</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container" style="max-width: 640px; padding-top: 2rem; padding-bottom: 2rem;">
        <h1 class="h3">Тестовая форма</h1>
        <p class="text-muted">Проверка полей ввода и маски телефона (jQuery Masked Input).</p>

        <form id="demoForm" method="get" action="#">
            <div class="form-group">
                <label for="field-date">Дата</label>
                <input class="form-control" id="field-date" type="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="field-comment">Текст</label>
                <textarea class="form-control" id="field-comment" name="comment" cols="45" rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label for="phone">Номер телефона</label>
                <input class="form-control" id="phone" name="phone" type="text" inputmode="numeric" autocomplete="tel" placeholder="8(___) ___-____" required>
            </div>

            <div class="form-group">
                <label for="field-email">Электронная почта</label>
                <input class="form-control" id="field-email" type="email" name="login" placeholder="mail@example.com" list="mailList" required>
                <datalist id="mailList">
                    <option value="mail@gmail.com">
                    <option value="mail@yandex.ru">
                    <option value="mail@mail.ru">
                </datalist>
            </div>

            <div class="form-group">
                <label for="field-num">Число (неотрицательное целое)</label>
                <input class="form-control" id="field-num" type="number" name="num" min="0" step="1" required>
            </div>

            <div class="form-group">
                <label for="field-file">Файл</label>
                <input id="field-file" type="file" name="f" required>
            </div>

            <button type="submit" class="btn btn-primary">Отправить</button>
        </form>
    </div>

    <script src="js/jquery-3.2.1.js"></script>
    <script src="js/jquery.maskedinput.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
